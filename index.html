<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Pets: Hardcore Arena V6 (1000 Level & 9 Pet)</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body {
            background-color: #022c22; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; color: #34d399; touch-action: none; transition: background 1s ease;
        }
        #gameContainer {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; background: transparent;
        }
        canvas {
            background: rgba(1, 20, 15, 0.8); display: block; border: 2px solid #10b981;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.15); z-index: 1; transition: background 1s ease;
        }

        /* HUD ARAYÜZÜ */
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.9);
            background: rgba(2, 44, 34, 0.9); padding: 8px 12px;
            border: 1px solid #10b981; z-index: 1000;
        }
        .hud-item { display: flex; align-items: center; gap: 4px; }
        
        #timeBadge {
            color: #f59e0b; background: rgba(245, 158, 11, 0.15);
            padding: 1px 6px; border: 1px dashed #f59e0b; transition: all 0.2s;
        }
        .time-bonus { animation: flashGreen 0.5s ease-out; }
        #coinBadge { color: #f1c40f; background: rgba(241, 196, 15, 0.15); padding: 2px 6px; border: 1px solid #f1c40f; }
        
        #changeCharBtn { cursor: pointer; padding: 2px 5px; border-radius: 4px; transition: background 0.2s; }
        #changeCharBtn:active { background: rgba(255,255,255,0.2); }

        /* SIFIRLAMA BUTONU EKLENDİ */
        #resetBtn { cursor: pointer; color: #ef4444; background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; padding: 2px 6px; border-radius: 4px; transition: 0.2s; }
        #resetBtn:active { background: rgba(239, 68, 68, 0.4); }

        @keyframes flashGreen {
            0% { background: rgba(16, 185, 129, 0.8); color: #fff; transform: scale(1.15); }
            100% { background: rgba(245, 158, 11, 0.15); color: #f59e0b; transform: scale(1); }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="hud">
        <div class="hud-item">LVL: <span id="levelText">1</span>/1000</div>
        <div class="hud-item">SÜRE: <span id="timeBadge"><span id="timerText">25</span>s</span></div>
        <div class="hud-item" id="changeCharBtn" title="Karakter Değiştir">PET: <span id="charText" style="color:#10b981">Moosey 🔄</span></div>
        <div class="hud-item" id="coinBadge">ÇİKO: <span id="coinText">0</span></div>
        <div class="hud-item" id="resetBtn" title="İlerlemeyi Sıfırla">🗑️</div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeGame() {
    const containerWidth = window.innerWidth;
    const containerHeight = window.innerHeight;
    const gameRatio = 800 / 400;
    if (containerWidth / containerHeight > gameRatio) {
        canvas.style.width = (containerHeight * gameRatio) + "px"; canvas.style.height = containerHeight + "px";
    } else {
        canvas.style.width = containerWidth + "px"; canvas.style.height = (containerWidth / gameRatio) + "px";
    }
}
window.addEventListener("resize", resizeGame); resizeGame();

// SES SİSTEMİ (Web Audio API) EKLENDİ
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function initAudio() { if(!audioCtx) audioCtx = new AudioContext(); if(audioCtx.state === 'suspended') audioCtx.resume(); }

function playSound(type) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'jump') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'dash') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15); osc.start(now); osc.stop(now + 0.15);
    } else if (type === 'coin') {
        osc.type = 'square'; osc.frequency.setValueAtTime(900, now); osc.frequency.setValueAtTime(1200, now + 0.05);
        gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'death') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'portal') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.4);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5); osc.start(now); osc.stop(now + 0.5);
    }
}
window.addEventListener("touchstart", initAudio, { once: true });
window.addEventListener("mousedown", initAudio, { once: true });
window.addEventListener("keydown", initAudio, { once: true });

const characterList = [
    { name: "Moosey", color: "#10b981", speed: 4.4, jump: -11.2 },
    { name: "Sugar", color: "#f43f5e", speed: 4.2, jump: -12.2 },
    { name: "Squeak", color: "#38bdf8", speed: 5.3, jump: -11.0 },
    { name: "Gus", color: "#eab308", speed: 3.9, jump: -11.4 },
    { name: "Dot", color: "#a855f7", speed: 4.8, jump: -10.8 },
    { name: "Flip", color: "#f97316", speed: 4.5, jump: -11.3 },
    { name: "Yeyet", color: "#ec4899", speed: 4.3, jump: -11.0 },
    { name: "Blook", color: "#8b5cf6", speed: 4.6, jump: -11.1 },
    { name: "Blinky", color: "#14b8a6", speed: 4.2, jump: -11.5 }
];

// RESİM ÖNYÜKLEME (PRELOADING) EKLENDİ
const images = {};
let imagesLoadedCount = 0;
let totalImagesToLoad = characterList.length + 1;
let gameStarted = false;

function checkPreload() {
    imagesLoadedCount++;
    if(imagesLoadedCount >= totalImagesToLoad && !gameStarted) {
        gameStarted = true;
        requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(gameLoop); });
    }
}

characterList.forEach(char => {
    images[char.name] = new Image();
    images[char.name].onload = checkPreload;
    images[char.name].onerror = checkPreload; // Hata alsa da oyunu başlatması için
    images[char.name].src = `${char.name}.jpg`;
});
images.Dot = new Image();
images.Dot.onload = checkPreload;
images.Dot.onerror = checkPreload;
images.Dot.src = 'Dot.jpg';

// Yükleme ekranı metni çizdiriliyor
ctx.fillStyle = "#10b981"; ctx.font = "20px Courier New"; ctx.textAlign = "center";
ctx.fillText("Resimler Yükleniyor...", canvas.width/2, canvas.height/2);

let currentLevel = parseInt(localStorage.getItem("pets_level_v6")) || 1;
let totalCoins = parseInt(localStorage.getItem("pets_coins")) || 0;
document.getElementById("coinText").innerText = totalCoins;

let activeCharIndex = 0;
let unlockedCharIndex = Math.min(Math.floor((currentLevel - 1) / 100), 8); 

// İLERLEMEYİ SIFIRLAMA BUTONU EKLENDİ
document.getElementById("resetBtn").addEventListener("click", () => {
    if(confirm("Tüm seviyeni ve çikolatalarını sıfırlamak istediğine emin misin?")) {
        localStorage.removeItem("pets_level_v6");
        localStorage.removeItem("pets_coins");
        location.reload();
    }
});

function updateAtmosphere() {
    let hue = (Math.floor((currentLevel - 1) / 100) * 40) % 360;
    document.body.style.backgroundColor = `hsl(${hue}, 40%, 12%)`;
    canvas.style.backgroundColor = `hsla(${hue}, 30%, 8%, 0.85)`;
}
updateAtmosphere();

document.getElementById("changeCharBtn").addEventListener("click", () => {
    activeCharIndex++;
    if (activeCharIndex > unlockedCharIndex || activeCharIndex >= characterList.length) activeCharIndex = 0;
    
    let cur = characterList[activeCharIndex];
    document.getElementById("charText").innerText = cur.name + " 🔄";
    document.getElementById("charText").style.color = cur.color;
});

let levelPieceCollected = false;
let levelTimer = 25;
let msTimer = 0;

let screenShakeFrames = 0;
let flashRedFrames = 0;
let particles = [];

let keys = { left: false, right: false, jump: false, dash: false };

let lastTime = performance.now();
const gravity = 0.52;
let friction = 0.80;
let coyoteTimer = 0;
const COYOTE_TIME_MAX = 0.1;
let jumpBufferTimer = 0;
const JUMP_BUFFER_MAX = 0.15;

const player = { 
    x: 60, y: 200, w: 32, h: 32, 
    velX: 0, velY: 0, grounded: false, speed: 4.4,
    facingDir: 1, jumpsMade: 0, dashTimer: 0, dashCooldownTimer: 0 
};

const canvasButtons = {
    left: { x: 55, y: 325, r: 35, active: false, label: "◀" },
    right: { x: 145, y: 325, r: 35, active: false, label: "▶" },
    dash: { x: 635, y: 325, r: 30, active: false, label: "⚡" },
    jump: { x: 735, y: 315, r: 40, active: false, label: "▲" }
};

function updateTouches(e) {
    if(e) e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    let prevJump = keys.jump;

    keys.left = keys.right = keys.dash = keys.jump = false;
    for (let key in canvasButtons) canvasButtons[key].active = false;

    if (e && e.touches) {
        for(let i = 0; i < e.touches.length; i++) {
            let tx = ((e.touches[i].clientX - rect.left) / rect.width) * canvas.width;
            let ty = ((e.touches[i].clientY - rect.top) / rect.height) * canvas.height;

            for (let key in canvasButtons) {
                let btn = canvasButtons[key];
                if (Math.hypot(tx - btn.x, ty - btn.y) < btn.r + 30) { 
                    keys[key] = true; btn.active = true;
                }
            }
        }
    }
    if (!prevJump && keys.jump) jumpBufferTimer = JUMP_BUFFER_MAX;
}

canvas.addEventListener("touchstart", updateTouches, { passive: false });
canvas.addEventListener("touchmove", updateTouches, { passive: false });
canvas.addEventListener("touchend", updateTouches, { passive: false });
canvas.addEventListener("touchcancel", updateTouches, { passive: false });

canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    updateTouches({ touches: [{ clientX: e.clientX, clientY: e.clientY }] });
});
canvas.addEventListener("mouseup", () => updateTouches({ touches: [] }));
canvas.addEventListener("mouseleave", () => updateTouches({ touches: [] }));

window.addEventListener("keydown", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") { keys.left = true; canvasButtons.left.active = true; }
    if (e.code === "ArrowRight" || e.code === "KeyD") { keys.right = true; canvasButtons.right.active = true; }
    if (e.code === "ShiftLeft" || e.code === "KeyE") { keys.dash = true; canvasButtons.dash.active = true; }
    if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") {
        if(!keys.jump) jumpBufferTimer = JUMP_BUFFER_MAX;
        keys.jump = true; canvasButtons.jump.active = true;
    }
});
window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") { keys.left = false; canvasButtons.left.active = false; }
    if (e.code === "ArrowRight" || e.code === "KeyD") { keys.right = false; canvasButtons.right.active = false; }
    if (e.code === "ShiftLeft" || e.code === "KeyE") { keys.dash = false; canvasButtons.dash.active = false; }
    if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") { keys.jump = false; canvasButtons.jump.active = false; }
});

function createParticles(x, y, color, count = 5) {
    for (let i = 0; i < count; i++) {
        particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, size: Math.random() * 4 + 2, alpha: 1, color: color });
    }
}

function triggerScreenShake(intensity = 5) { screenShakeFrames = intensity; }

function handleDeath() {
    playSound('death');
    flashRedFrames = 15; triggerScreenShake(12);
    player.x = 60; player.y = 200; player.velX = 0; player.velY = 0;
    player.dashTimer = 0; player.dashCooldownTimer = 0; player.jumpsMade = 0;
    levelPieceCollected = false; 
    levelTimer = 25; document.getElementById("timerText").innerText = levelTimer;
    activeLevel = generateLevel(currentLevel); 
}

function generateLevel(lvl) {
    let difficulty = Math.min(lvl / 150, 6); 
    let seed = lvl * 1543;
    function randomSeed() { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }

    let levelData = {
        platforms: [{ x: 0, y: 340, width: 140, height: 60, type: 'normal' }],
        dotPiece: { x: 350, y: 180, width: 24, height: 24 },
        portal: { x: 745, y: 280, width: 45, height: 60 },
        chocolates: []
    };

    let currentX = 160; let currentY = 240 + Math.floor(randomSeed() * 60);

    for (let i = 0; i < 4; i++) {
        let pWidth = Math.max(120 - (difficulty * 12) - Math.floor(randomSeed() * 10), 40);
        
        // İMKANSIZ ZIPLAMA ENGELLEYİCİSİ EKLENDİ (Safeguard)
        let stepGap = 80 + (difficulty * 8) + Math.floor(randomSeed() * 30); 
        let maxSafeGap = 130; 
        if(stepGap > maxSafeGap) stepGap = maxSafeGap;

        let pType = 'normal';
        let rType = randomSeed();
        if (lvl > 20 && rType > 0.75) pType = 'crumbling';
        if (lvl > 50 && rType <= 0.35) pType = 'moving';
        if (lvl > 200 && rType > 0.35 && rType <= 0.6) pType = 'crumbling';

        levelData.platforms.push({ 
            x: currentX, y: currentY, width: pWidth, height: 15, 
            type: pType, startY: currentY, startX: currentX,
            range: 35 + (difficulty * 10) + Math.floor(randomSeed() * 20),
            speed: 0.015 + (difficulty * 0.003) + (randomSeed() * 0.01),
            angle: randomSeed() * Math.PI * 2,
            moveDir: randomSeed() > 0.5 ? 'vertical' : 'horizontal',
            stepped: false, stepTime: 0, broken: false
        });
        
        if (randomSeed() > 0.40) levelData.chocolates.push({ x: currentX + (pWidth / 2) - 8, y: currentY - 25, width: 16, height: 16, collected: false });
        if (i === 2) { levelData.dotPiece.x = currentX + (pWidth / 2) - 12; levelData.dotPiece.y = currentY - 40; }

        currentX += stepGap; 
        
        // YÜKSEKLİK İÇİN GÜVENLİK LİMİTİ (Safeguard)
        let yDiff = Math.floor(randomSeed() * 70) - 35;
        let maxSafeYDiff = 50;
        if(yDiff > maxSafeYDiff) yDiff = maxSafeYDiff;
        if(yDiff < -maxSafeYDiff) yDiff = -maxSafeYDiff;
        currentY += yDiff;

        currentY = Math.max(120, Math.min(currentY, 320));
    }
    levelData.platforms.push({ x: 730, y: 340, width: 70, height: 60, type: 'normal' });
    return levelData;
}

let activeLevel = generateLevel(currentLevel);
document.getElementById("levelText").innerText = currentLevel;

function checkCollision(obj1, obj2) {
    return obj1.x < obj2.x + obj2.width && obj1.x + (obj1.w || obj1.width) > obj2.x &&
           obj1.y < obj2.y + obj2.height && obj1.y + (obj1.h || obj1.height) > obj2.y;
}

function update(dtTime) {
    msTimer += dtTime;
    if(msTimer >= 1000) {
        levelTimer--; msTimer = 0;
        document.getElementById("timerText").innerText = levelTimer;
        if(levelTimer <= 0) handleDeath();
    }

    let timeScale = dtTime / 16.666;
    if(timeScale > 3) timeScale = 3; 

    let curChar = characterList[activeCharIndex];
    player.speed = curChar.speed;

    let wasGrounded = player.grounded;
    player.grounded = false;

    if(wasGrounded) { coyoteTimer = COYOTE_TIME_MAX; player.jumpsMade = 0; } 
    else { coyoteTimer -= (dtTime / 1000); }
    
    if(jumpBufferTimer > 0) jumpBufferTimer -= (dtTime / 1000);
    if(player.dashCooldownTimer > 0) player.dashCooldownTimer -= (dtTime / 1000);

    if (keys.dash && player.dashCooldownTimer <= 0) {
        playSound('dash');
        player.dashTimer = 0.15; player.dashCooldownTimer = 1.5; triggerScreenShake(4);
    }

    if (player.dashTimer > 0) {
        player.velX = player.facingDir * 14 * timeScale; player.velY = 0; 
        player.dashTimer -= (dtTime / 1000);
        createParticles(player.x + player.w/2, player.y + player.h/2, curChar.color, 2); 
    } else {
        if (keys.left) { player.facingDir = -1; if (player.velX > -player.speed) player.velX -= 0.85 * timeScale; }
        if (keys.right) { player.facingDir = 1; if (player.velX < player.speed) player.velX += 0.85 * timeScale; }
        player.velX *= Math.pow(friction, timeScale); 
        player.velY += gravity * timeScale;
    }

    if (jumpBufferTimer > 0) {
        if (coyoteTimer > 0) {
            playSound('jump');
            player.velY = curChar.jump; player.jumpsMade = 1; coyoteTimer = 0; jumpBufferTimer = 0;
            createParticles(player.x + player.w/2, player.y + player.h, '#ffffff', 8);
        } else if (player.jumpsMade === 1 && player.dashTimer <= 0) {
            playSound('jump');
            player.velY = curChar.jump * 0.9; player.jumpsMade = 2; jumpBufferTimer = 0;
            createParticles(player.x + player.w/2, player.y + player.h, '#38bdf8', 12); 
        }
    }

    activeLevel.platforms.forEach(p => {
        if (p.broken) return;

        if (p.type === 'moving') {
            p.angle += p.speed * timeScale;
            if (p.moveDir === 'vertical') p.y = p.startY + Math.sin(p.angle) * p.range;
            else p.x = p.startX + Math.sin(p.angle) * p.range;
        }

        if (p.type === 'crumbling' && p.stepped) {
            if (performance.now() - p.stepTime > 1000) {
                p.broken = true; createParticles(p.x + p.width/2, p.y + p.height/2, '#10b981', 8);
            }
        }

        if (player.x + player.w > p.x && player.x < p.x + p.width &&
            player.y + player.h <= p.y + 15 && player.y + player.h + player.velY >= p.y) {
            
            player.grounded = true; player.velY = 0; player.y = p.y - player.h;

            if (p.type === 'moving' && p.moveDir === 'horizontal') player.x += Math.cos(p.angle) * (p.range * p.speed) * timeScale;
            if (p.type === 'crumbling' && !p.stepped) { p.stepped = true; p.stepTime = performance.now(); }
        }
    });

    player.x += player.velX * timeScale; player.y += player.velY * timeScale;

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
    if (player.y > canvas.height + 50) handleDeath();

    activeLevel.chocolates.forEach(choc => {
        if (!choc.collected && checkCollision(player, choc)) {
            playSound('coin');
            choc.collected = true; totalCoins++; localStorage.setItem("pets_coins", totalCoins);
            document.getElementById("coinText").innerText = totalCoins;
            levelTimer += 3; document.getElementById("timerText").innerText = levelTimer;
            
            let badge = document.getElementById("timeBadge");
            badge.classList.remove("time-bonus"); void badge.offsetWidth; badge.classList.add("time-bonus");
            createParticles(choc.x + 8, choc.y + 8, '#f1c40f', 10);
        }
    });

    if (!levelPieceCollected && checkCollision(player, activeLevel.dotPiece)) {
        playSound('coin');
        levelPieceCollected = true; triggerScreenShake(3);
        createParticles(activeLevel.dotPiece.x + 12, activeLevel.dotPiece.y + 12, '#00ffff', 15);
    }

    if (levelPieceCollected && checkCollision(player, activeLevel.portal)) {
        if (currentLevel < 1000) {
            playSound('portal');
            currentLevel++; localStorage.setItem("pets_level_v6", currentLevel);
            
            let newUnlocked = Math.floor((currentLevel - 1) / 100);
            if (newUnlocked > unlockedCharIndex && newUnlocked <= 8) {
                unlockedCharIndex = newUnlocked;
                alert(`TEBRİKLER! ${currentLevel}. Leveldesin! Yeni Pet Açıldı: ${characterList[unlockedCharIndex].name} 🎉`);
            }

            activeLevel = generateLevel(currentLevel); levelPieceCollected = false;
            document.getElementById("levelText").innerText = currentLevel;
            updateAtmosphere(); triggerScreenShake(8);
            player.x = 60; player.y = 200; player.velX = 0; player.velY = 0; player.dashCooldownTimer = 0;
            levelTimer = 25; document.getElementById("timerText").innerText = levelTimer;
        } else {
            alert("İNANILMAZ! 1000 LEVELİ BİTİRDİN! SEN BİR EFSANESİN! 🏆");
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx * timeScale; p.y += p.vy * timeScale; p.alpha -= 0.025 * timeScale;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save(); 
    if (screenShakeFrames > 0) {
        let dx = (Math.random() - 0.5) * screenShakeFrames; let dy = (Math.random() - 0.5) * screenShakeFrames;
        ctx.translate(dx, dy); screenShakeFrames--;
    }

    activeLevel.platforms.forEach(p => {
        if (p.broken) return;
        if (p.type === 'normal') ctx.fillStyle = "#047857";
        else if (p.type === 'moving') ctx.fillStyle = "#1d4ed8";
        else if (p.type === 'crumbling') {
            if (p.stepped) ctx.fillStyle = (performance.now() - p.stepTime) > 650 ? "#b91c1c" : "#eab308";
            else ctx.fillStyle = "#b45309";
        }
        ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.fillStyle = "#10b981"; ctx.fillRect(p.x, p.y, p.width, 3);
    });

    activeLevel.chocolates.forEach(choc => {
        if (!choc.collected) {
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(choc.x, choc.y, choc.width, choc.height);
            ctx.fillStyle = "#d35400"; ctx.fillRect(choc.x + 4, choc.y + 4, 8, 8);
        }
    });

    if (!levelPieceCollected) {
        if (images.Dot.complete && images.Dot.naturalWidth !== 0) {
            ctx.drawImage(images.Dot, activeLevel.dotPiece.x, activeLevel.dotPiece.y, activeLevel.dotPiece.width, activeLevel.dotPiece.height);
        } else {
            ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(activeLevel.dotPiece.x + 12, activeLevel.dotPiece.y + 12, 10, 0, Math.PI * 2); ctx.fill();
        }
    }

    ctx.fillStyle = levelPieceCollected ? "#8b5cf6" : "#4b5563";
    ctx.fillRect(activeLevel.portal.x, activeLevel.portal.y, activeLevel.portal.width, activeLevel.portal.height);

    let curChar = characterList[activeCharIndex];
    let stretchY = 1 + (Math.abs(player.velY) * 0.02); let stretchX = 1 - (Math.abs(player.velY) * 0.015);
    if(player.dashTimer > 0) { stretchX = 1.3; stretchY = 0.7; } 

    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h); 
    if(player.facingDir === -1) ctx.scale(-1, 1);
    
    if (images[curChar.name] && images[curChar.name].complete && images[curChar.name].naturalWidth !== 0) {
        ctx.drawImage(images[curChar.name], - (player.w * stretchX)/2, - (player.h * stretchY), player.w * stretchX, player.h * stretchY);
    } else {
        ctx.fillStyle = curChar.color; ctx.fillRect(- (player.w * stretchX)/2, - (player.h * stretchY), player.w * stretchX, player.h * stretchY);
    }
    ctx.restore();

    particles.forEach(p => {
        ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    ctx.restore(); 

    if (flashRedFrames > 0) {
        ctx.fillStyle = `rgba(220, 38, 38, ${flashRedFrames / 15})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height); flashRedFrames--;
    }

    for (let key in canvasButtons) {
        let btn = canvasButtons[key];
        ctx.fillStyle = btn.active ? "#111827" : "#1f2937";
        if(key === 'jump') ctx.fillStyle = btn.active ? "#991b1b" : "#dc2626";
        if(key === 'dash') {
            ctx.fillStyle = btn.active ? "#b45309" : "#f59e0b"; 
            if(player.dashCooldownTimer > 0) ctx.fillStyle = "#4b5563"; 
        }
        ctx.strokeStyle = "#10b981"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

        ctx.fillStyle = "#ffffff"; ctx.font = `bold ${key === 'jump' ? '32px' : '22px'} Arial`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        
        if(key === 'dash' && player.dashCooldownTimer > 0) {
            ctx.font = "bold 16px Arial"; ctx.fillText(player.dashCooldownTimer.toFixed(1), btn.x, btn.y + 1);
        } else { ctx.fillText(btn.label, btn.x, btn.y + (key === 'jump' ? -2 : 1)); }
    }
}

function gameLoop(timestamp) {
    let dt = timestamp - lastTime; lastTime = timestamp;
    update(dt); draw(); requestAnimationFrame(gameLoop);
}
// requestAnimationFrame döngüsü resimler yüklendikten sonra 'checkPreload' fonksiyonu içinden başlatılacak şekilde değiştirildi.
</script>
