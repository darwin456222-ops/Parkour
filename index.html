<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Pets: Hardcore Arena V4</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body {
            background-color: #022c22; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; color: #34d399; touch-action: none;
        }
        #gameContainer {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; background: #01140f;
        }
        canvas {
            background: #01140f; display: block; border: 2px solid #10b981;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.15); z-index: 1;
        }

        /* HUD ARAYÜZÜ */
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.9);
            background: rgba(2, 44, 34, 0.9); padding: 8px 12px;
            border: 1px solid #10b981; z-index: 1000;
        }
        .hud-item { display: flex; align-items: center; gap: 4px; }
        #coinBadge { color: #f1c40f; background: rgba(241, 196, 15, 0.15); padding: 2px 6px; border: 1px solid #f1c40f; }

        /* MOBIL DOKUNMATIK ALANLAR (Görünmez) */
        #touchZones {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex;
        }
        .touch-left-container { width: 50%; height: 100%; display: flex; }
        .touch-btn { flex: 1; height: 100%; }
        .touch-right-container { width: 50%; height: 100%; }

        /* ÖLÜM / REKLAM EKRANI (Monetizasyon Simülasyonu) */
        #gameOverScreen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(2, 44, 34, 0.95); border: 2px solid #f59e0b; padding: 20px;
            text-align: center; z-index: 2000; display: none; flex-direction: column; gap: 15px;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
        }
        .btn {
            padding: 10px 15px; font-family: inherit; font-weight: bold; border: none;
            cursor: pointer; font-size: 14px; text-transform: uppercase; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-ad { background: #f59e0b; color: #000; border: 1px solid #fff; }
        .btn-restart { background: #dc2626; color: #fff; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div id="touchZones">
        <div class="touch-left-container">
            <div class="touch-btn" id="btnLeft"></div>
            <div class="touch-btn" id="btnRight"></div>
        </div>
        <div class="touch-right-container" id="btnJump"></div>
    </div>

    <div id="hud">
        <div class="hud-item">SVY: <span id="levelText">1</span></div>
        <div class="hud-item">PET: <span id="charText" style="color:#10b981">Moosey</span></div>
        <div class="hud-item">PARÇA: <span id="piecesText">0/1</span></div>
        <div class="hud-item" id="coinBadge">ÇİKOLATA: <span id="coinText">0</span></div>
    </div>

    <div id="gameOverScreen">
        <h2 style="color: #ef4444; margin-bottom: 5px;">YANDIN!</h2>
        <p style="color: #fff; font-size: 12px;">Seviyeyi kaybetmek üzere misin?</p>
        <button class="btn btn-ad" id="adReviveBtn">▶ REKLAM İZLE & DİRİL</button>
        <button class="btn btn-restart" id="restartLevelBtn">BAŞTAN BAŞLA</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeGame() {
    const containerWidth = window.innerWidth;
    const containerHeight = window.innerHeight;
    const gameRatio = 800 / 400;
    if (containerWidth / containerHeight > gameRatio) {
        canvas.style.width = (containerHeight * gameRatio) + "px"; canvas.style.height = containerHeight + "px";
    } else {
        canvas.style.width = containerWidth + "px"; canvas.style.height = (containerWidth / gameRatio) + "px";
    }
}
window.addEventListener("resize", resizeGame); resizeGame();

const characterList = [
    { name: "Moosey", color: "#10b981", speed: 4.4, jump: -11.2 },
    { name: "Sugar", color: "#f43f5e", speed: 4.2, jump: -12.2 },
    { name: "Squeak", color: "#38bdf8", speed: 5.3, jump: -11.0 }
];

// Kalıcı Veriler
let currentLevel = parseInt(localStorage.getItem("pets_level")) || 1;
let totalCoins = parseInt(localStorage.getItem("pets_coins")) || 0;
document.getElementById("coinText").innerText = totalCoins;

let activeCharIndex = 0;
let levelPieceCollected = false;
let isGameOver = false;

// Kontroller
let keys = { left: false, right: false, jump: false };

// Profesyonel Fizik ve Game Feel Değişkenleri
let lastTime = performance.now();
const gravity = 0.52;
let friction = 0.80;
let coyoteTimer = 0;
const COYOTE_TIME_MAX = 0.1; // 100ms boşlukta zıplama toleransı
let jumpBufferTimer = 0;
const JUMP_BUFFER_MAX = 0.15; // 150ms erken zıplama toleransı
let screenShakeFrames = 0;

let particles = [];

const player = { x: 60, y: 200, w: 32, h: 32, velX: 0, velY: 0, grounded: false, speed: 4.4 };

// Mobil Dokunmatik Algılayıcılar
const btnLeft = document.getElementById("btnLeft");
const btnRight = document.getElementById("btnRight");
const btnJump = document.getElementById("btnJump");

const addTouchEvents = (el, keyName) => {
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyName] = true; if(keyName === 'jump') jumpBufferTimer = JUMP_BUFFER_MAX; });
    el.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyName] = false; });
};
addTouchEvents(btnLeft, 'left');
addTouchEvents(btnRight, 'right');
addTouchEvents(btnJump, 'jump');

// Klavye Kontrolleri
window.addEventListener("keydown", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
    if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
    if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") {
        if(!keys.jump) jumpBufferTimer = JUMP_BUFFER_MAX;
        keys.jump = true;
    }
});
window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
    if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
    if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.jump = false;
});

function createParticles(x, y, color, count = 5) {
    for (let i = 0; i < count; i++) {
        particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3, size: Math.random() * 4 + 2, alpha: 1, color: color });
    }
}

function triggerScreenShake(intensity = 5) { screenShakeFrames = intensity; }

// Seviye Üretimi (Güvenli atlama mesafeleri gözetilerek)
function generateLevel(lvl) {
    let difficulty = Math.min(lvl / 25, 5); 
    let seed = lvl * 1543;
    function randomSeed() { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }

    let levelData = {
        platforms: [{ x: 0, y: 340, width: 140, height: 60, type: 'normal' }],
        dotPiece: { x: 350, y: 180, width: 24, height: 24 },
        portal: { x: 745, y: 280, width: 45, height: 60 },
        chocolates: []
    };

    let currentX = 160;
    let currentY = 240 + Math.floor(randomSeed() * 60);

    for (let i = 0; i < 4; i++) {
        let pWidth = Math.max(120 - (difficulty * 11), 50);
        // Maksimum atlama boşluğu sınırlandırıldı (İmkansız bölümleri engellemek için)
        let stepGap = 80 + (difficulty * 5) + Math.floor(randomSeed() * 30); 

        levelData.platforms.push({ 
            x: currentX, y: currentY, width: pWidth, height: 15, type: 'normal', broken: false 
        });

        if (randomSeed() > 0.40) {
            levelData.chocolates.push({ x: currentX + (pWidth / 2) - 8, y: currentY - 25, width: 16, height: 16, collected: false });
        }

        if (i === 2) { levelData.dotPiece.x = currentX + (pWidth / 2) - 12; levelData.dotPiece.y = currentY - 40; }

        currentX += stepGap;
        currentY += Math.floor(randomSeed() * 60) - 30;
        currentY = Math.max(140, Math.min(currentY, 310));
    }
    levelData.platforms.push({ x: 730, y: 340, width: 70, height: 60, type: 'normal' });
    return levelData;
}

let activeLevel = generateLevel(currentLevel);
document.getElementById("levelText").innerText = currentLevel;

function checkCollision(obj1, obj2) {
    return obj1.x < obj2.x + obj2.width && obj1.x + (obj1.w || obj1.width) > obj2.x &&
           obj1.y < obj2.y + obj2.height && obj1.y + (obj1.h || obj1.height) > obj2.y;
}

function handleDeath() {
    if(isGameOver) return;
    isGameOver = true;
    triggerScreenShake(15);
    document.getElementById("gameOverScreen").style.display = "flex";
    document.getElementById("touchZones").style.pointerEvents = "none";
}

document.getElementById("adReviveBtn").addEventListener("click", () => {
    // Reklam izleme simülasyonu
    document.getElementById("adReviveBtn").innerText = "REKLAM YÜKLENİYOR...";
    setTimeout(() => {
        isGameOver = false;
        player.y = 0; // Yukarıdan güvenli bırak
        player.velY = 0;
        document.getElementById("gameOverScreen").style.display = "none";
        document.getElementById("touchZones").style.pointerEvents = "auto";
        document.getElementById("adReviveBtn").innerText = "▶ REKLAM İZLE & DİRİL";
    }, 1000);
});

document.getElementById("restartLevelBtn").addEventListener("click", () => {
    isGameOver = false;
    player.x = 60; player.y = 200; player.velX = 0; player.velY = 0;
    levelPieceCollected = false; document.getElementById("piecesText").innerText = "0/1";
    activeLevel = generateLevel(currentLevel); // Aynı bölümü sıfırla
    document.getElementById("gameOverScreen").style.display = "none";
    document.getElementById("touchZones").style.pointerEvents = "auto";
});


function update(dtTime) {
    if (isGameOver) return;
    
    // FPS Bağımsızlık Çarpanı (Hedef: 60fps -> 16.6ms per frame)
    let timeScale = dtTime / 16.666;
    if(timeScale > 3) timeScale = 3; // Sekme anlarında (sekme değiştirme vs) devasa atlamaları önler

    let curChar = characterList[activeCharIndex];
    player.speed = curChar.speed;

    let wasGrounded = player.grounded;
    player.grounded = false;

    // Yatay Hareket
    if (keys.left) { if (player.velX > -player.speed) player.velX -= 0.85 * timeScale; }
    if (keys.right) { if (player.velX < player.speed) player.velX += 0.85 * timeScale; }
    player.velX *= Math.pow(friction, timeScale); // Zaman bazlı sürtünme

    // Coyote Time ve Jump Buffer Düşüşü
    if(wasGrounded) coyoteTimer = COYOTE_TIME_MAX;
    else coyoteTimer -= (dtTime / 1000);
    
    if(jumpBufferTimer > 0) jumpBufferTimer -= (dtTime / 1000);

    // Mükemmel Zıplama Kontrolü
    if (jumpBufferTimer > 0 && coyoteTimer > 0) {
        player.velY = curChar.jump;
        coyoteTimer = 0; 
        jumpBufferTimer = 0;
        createParticles(player.x + player.w/2, player.y + player.h, '#ffffff', 8);
    }

    player.velY += gravity * timeScale;

    // Y Ekseni Çarpışma ve Yer Kontrolü
    activeLevel.platforms.forEach(p => {
        if (player.x + player.w > p.x && player.x < p.x + p.width &&
            player.y + player.h <= p.y + 15 && player.y + player.h + player.velY >= p.y) {
            player.grounded = true;
            player.velY = 0;
            player.y = p.y - player.h;
        }
    });

    player.x += player.velX * timeScale;
    player.y += player.velY * timeScale;

    // Sınırlar ve Düşme
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
    if (player.y > canvas.height + 50) handleDeath();

    // Çikolata Toplama (Monetizasyon Altyapısı)
    activeLevel.chocolates.forEach(choc => {
        if (!choc.collected && checkCollision(player, choc)) {
            choc.collected = true;
            totalCoins++;
            localStorage.setItem("pets_coins", totalCoins);
            document.getElementById("coinText").innerText = totalCoins;
            createParticles(choc.x + 8, choc.y + 8, '#f1c40f', 10);
        }
    });

    // Parça Toplama
    if (!levelPieceCollected && checkCollision(player, activeLevel.dotPiece)) {
        levelPieceCollected = true;
        document.getElementById("piecesText").innerText = "1/1";
        triggerScreenShake(3);
        createParticles(activeLevel.dotPiece.x + 12, activeLevel.dotPiece.y + 12, '#00ffff', 15);
    }

    // Portal (Seviye Geçişi)
    if (levelPieceCollected && checkCollision(player, activeLevel.portal)) {
        currentLevel++;
        localStorage.setItem("pets_level", currentLevel);
        activeLevel = generateLevel(currentLevel);
        levelPieceCollected = false;
        document.getElementById("levelText").innerText = currentLevel;
        document.getElementById("piecesText").innerText = "0/1";
        triggerScreenShake(8);
        player.x = 60; player.y = 200; player.velX = 0; player.velY = 0;
    }

    // Partiküllerin Güncellenmesi
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * timeScale; p.y += p.vy * timeScale;
        p.alpha -= 0.025 * timeScale;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // Ekran Sarsıntısı Uygulaması
    if (screenShakeFrames > 0) {
        let dx = (Math.random() - 0.5) * screenShakeFrames;
        let dy = (Math.random() - 0.5) * screenShakeFrames;
        ctx.translate(dx, dy);
        screenShakeFrames--;
    }

    // Platform Çizimi
    activeLevel.platforms.forEach(p => {
        ctx.fillStyle = "#047857"; ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.fillStyle = "#10b981"; ctx.fillRect(p.x, p.y, p.width, 3);
    });

    // Çikolata Çizimi
    activeLevel.chocolates.forEach(choc => {
        if (!choc.collected) {
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(choc.x, choc.y, choc.width, choc.height);
            ctx.fillStyle = "#d35400"; ctx.fillRect(choc.x + 4, choc.y + 4, 8, 8);
        }
    });

    // Dot Parçası Çizimi
    if (!levelPieceCollected) {
        ctx.fillStyle = "#00ffff";
        ctx.beginPath(); ctx.arc(activeLevel.dotPiece.x + 12, activeLevel.dotPiece.y + 12, 10, 0, Math.PI * 2); ctx.fill();
    }

    // Portal Çizimi
    ctx.fillStyle = levelPieceCollected ? "#8b5cf6" : "#4b5563";
    ctx.fillRect(activeLevel.portal.x, activeLevel.portal.y, activeLevel.portal.width, activeLevel.portal.height);

    // Karakter Çizimi
    ctx.fillStyle = characterList[activeCharIndex].color;
    // Stretch efekti (Zıplarken uzama, düşerken ezilme animasyon yanılsaması)
    let stretchY = 1 + (Math.abs(player.velY) * 0.02);
    let stretchX = 1 - (Math.abs(player.velY) * 0.015);
    ctx.fillRect(player.x + (player.w - player.w * stretchX)/2, player.y + (player.h - player.h * stretchY), player.w * stretchX, player.h * stretchY);

    // Partiküller Çizimi
    particles.forEach(p => {
        ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    ctx.restore();
}

function gameLoop(timestamp) {
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(gameLoop); });
</script>
</body>
</html>
