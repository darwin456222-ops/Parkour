<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Pets: Hardcore Arena V5.1 (Sabit Tuşlar)</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body {
            background-color: #022c22; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; color: #34d399; touch-action: none;
        }
        #gameContainer {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; background: #01140f;
        }
        canvas {
            background: #01140f; display: block; border: 2px solid #10b981;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.15); z-index: 1;
        }

        /* HUD ARAYÜZÜ */
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.9);
            background: rgba(2, 44, 34, 0.9); padding: 8px 12px;
            border: 1px solid #10b981; z-index: 1000;
        }
        .hud-item { display: flex; align-items: center; gap: 4px; }
        
        #timeBadge {
            color: #f59e0b; background: rgba(245, 158, 11, 0.15);
            padding: 1px 6px; border: 1px dashed #f59e0b; transition: all 0.2s;
        }
        .time-bonus { animation: flashGreen 0.5s ease-out; }
        #coinBadge { color: #f1c40f; background: rgba(241, 196, 15, 0.15); padding: 2px 6px; border: 1px solid #f1c40f; }

        @keyframes flashGreen {
            0% { background: rgba(16, 185, 129, 0.8); color: #fff; transform: scale(1.15); }
            100% { background: rgba(245, 158, 11, 0.15); color: #f59e0b; transform: scale(1); }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="hud">
        <div class="hud-item">SVY: <span id="levelText">1</span></div>
        <div class="hud-item">SÜRE: <span id="timeBadge"><span id="timerText">25</span>s</span></div>
        <div class="hud-item">PET: <span id="charText" style="color:#10b981">Moosey</span></div>
        <div class="hud-item">PARÇA: <span id="piecesText">0/1</span></div>
        <div class="hud-item" id="coinBadge">ÇİKO: <span id="coinText">0</span></div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeGame() {
    const containerWidth = window.innerWidth;
    const containerHeight = window.innerHeight;
    const gameRatio = 800 / 400;
    if (containerWidth / containerHeight > gameRatio) {
        canvas.style.width = (containerHeight * gameRatio) + "px"; canvas.style.height = containerHeight + "px";
    } else {
        canvas.style.width = containerWidth + "px"; canvas.style.height = (containerWidth / gameRatio) + "px";
    }
}
window.addEventListener("resize", resizeGame); resizeGame();

const characterList = [
    { name: "Moosey", color: "#10b981", speed: 4.4, jump: -11.2 },
    { name: "Sugar", color: "#f43f5e", speed: 4.2, jump: -12.2 },
    { name: "Squeak", color: "#38bdf8", speed: 5.3, jump: -11.0 }
];

const images = {};
characterList.forEach(char => {
    images[char.name] = new Image();
    images[char.name].src = `${char.name}.jpg`;
});
images.Dot = new Image();
images.Dot.src = 'Dot.jpg';

let currentLevel = parseInt(localStorage.getItem("pets_level")) || 1;
let totalCoins = parseInt(localStorage.getItem("pets_coins")) || 0;
document.getElementById("coinText").innerText = totalCoins;

let activeCharIndex = 0;
let levelPieceCollected = false;

let levelTimer = 25;
let msTimer = 0;

let screenShakeFrames = 0;
let flashRedFrames = 0;
let particles = [];

let keys = { left: false, right: false, jump: false, dash: false };

let lastTime = performance.now();
const gravity = 0.52;
let friction = 0.80;
let coyoteTimer = 0;
const COYOTE_TIME_MAX = 0.1;
let jumpBufferTimer = 0;
const JUMP_BUFFER_MAX = 0.15;

const player = { 
    x: 60, y: 200, w: 32, h: 32, 
    velX: 0, velY: 0, grounded: false, speed: 4.4,
    facingDir: 1, jumpsMade: 0, dashTimer: 0, dashCooldownTimer: 0 
};

// BUTON KONUMLARI
const canvasButtons = {
    left: { x: 55, y: 325, r: 35, active: false, label: "◀" },
    right: { x: 145, y: 325, r: 35, active: false, label: "▶" },
    dash: { x: 635, y: 325, r: 30, active: false, label: "⚡" },
    jump: { x: 735, y: 315, r: 40, active: false, label: "▲" }
};

// --- YENİ KUSURSUZ ÇOKLU DOKUNMATİK SİSTEMİ ---
function updateTouches(e) {
    if(e) e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    
    let prevJump = keys.jump;

    // Önce tüm tuşları sıfırla
    keys.left = keys.right = keys.dash = keys.jump = false;
    for (let key in canvasButtons) canvasButtons[key].active = false;

    // Ekranda basılı olan TÜM parmakları tara
    if (e && e.touches) {
        for(let i = 0; i < e.touches.length; i++) {
            let tx = ((e.touches[i].clientX - rect.left) / rect.width) * canvas.width;
            let ty = ((e.touches[i].clientY - rect.top) / rect.height) * canvas.height;

            for (let key in canvasButtons) {
                let btn = canvasButtons[key];
                // Dokunma toleransını (hitbox) +30 piksel yaptık ki parmak kaysa bile çalışsın
                let dist = Math.hypot(tx - btn.x, ty - btn.y);
                if (dist < btn.r + 30) { 
                    keys[key] = true;
                    btn.active = true;
                }
            }
        }
    }

    // Tampon bellek kontrolü (Erken zıplamayı kaydet)
    if (!prevJump && keys.jump) {
        jumpBufferTimer = JUMP_BUFFER_MAX;
    }
}

// Tüm dokunmatik olayları aynı güçlü fonksiyona bağladık
canvas.addEventListener("touchstart", updateTouches, { passive: false });
canvas.addEventListener("touchmove", updateTouches, { passive: false });
canvas.addEventListener("touchend", updateTouches, { passive: false });
canvas.addEventListener("touchcancel", updateTouches, { passive: false });

// Mouse Desteği (Bilgisayar testleri için)
canvas.addEventListener("mousedown", (e) => {
    const rect = canvas.getBoundingClientRect();
    let eFake = { touches: [{ clientX: e.clientX, clientY: e.clientY }] };
    updateTouches(eFake);
});
canvas.addEventListener("mouseup", () => updateTouches({ touches: [] }));
canvas.addEventListener("mouseleave", () => updateTouches({ touches: [] }));

// Klavye Kontrolleri
window.addEventListener("keydown", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") { keys.left = true; canvasButtons.left.active = true; }
    if (e.code === "ArrowRight" || e.code === "KeyD") { keys.right = true; canvasButtons.right.active = true; }
    if (e.code === "ShiftLeft" || e.code === "ShiftRight" || e.code === "KeyE") { keys.dash = true; canvasButtons.dash.active = true; }
    if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") {
        if(!keys.jump) jumpBufferTimer = JUMP_BUFFER_MAX;
        keys.jump = true; canvasButtons.jump.active = true;
    }
});
window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") { keys.left = false; canvasButtons.left.active = false; }
    if (e.code === "ArrowRight" || e.code === "KeyD") { keys.right = false; canvasButtons.right.active = false; }
    if (e.code === "ShiftLeft" || e.code === "ShiftRight" || e.code === "KeyE") { keys.dash = false; canvasButtons.dash.active = false; }
    if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") { keys.jump = false; canvasButtons.jump.active = false; }
});

function createParticles(x, y, color, count = 5) {
    for (let i = 0; i < count; i++) {
        particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, size: Math.random() * 4 + 2, alpha: 1, color: color });
    }
}

function triggerScreenShake(intensity = 5) { screenShakeFrames = intensity; }

function handleDeath() {
    flashRedFrames = 15;
    triggerScreenShake(12);
    player.x = 60; player.y = 200; player.velX = 0; player.velY = 0;
    player.dashTimer = 0; player.dashCooldownTimer = 0; player.jumpsMade = 0;
    levelPieceCollected = false; document.getElementById("piecesText").innerText = "0/1";
    levelTimer = 25; document.getElementById("timerText").innerText = levelTimer;
    activeLevel = generateLevel(currentLevel); 
}

function generateLevel(lvl) {
    let difficulty = Math.min(lvl / 25, 5); 
    let seed = lvl * 1543;
    function randomSeed() { let x = Math.sin(seed++) * 10000; return x - Math.floor(x); }

    let levelData = {
        platforms: [{ x: 0, y: 340, width: 140, height: 60 }],
        dotPiece: { x: 350, y: 180, width: 24, height: 24 },
        portal: { x: 745, y: 280, width: 45, height: 60 },
        chocolates: []
    };

    let currentX = 160; let currentY = 240 + Math.floor(randomSeed() * 60);

    for (let i = 0; i < 4; i++) {
        let pWidth = Math.max(120 - (difficulty * 11), 50);
        let stepGap = 80 + (difficulty * 5) + Math.floor(randomSeed() * 30); 

        levelData.platforms.push({ x: currentX, y: currentY, width: pWidth, height: 15 });
        
        if (randomSeed() > 0.40) levelData.chocolates.push({ x: currentX + (pWidth / 2) - 8, y: currentY - 25, width: 16, height: 16, collected: false });
        if (i === 2) { levelData.dotPiece.x = currentX + (pWidth / 2) - 12; levelData.dotPiece.y = currentY - 40; }

        currentX += stepGap; currentY += Math.floor(randomSeed() * 60) - 30;
        currentY = Math.max(140, Math.min(currentY, 310));
    }
    levelData.platforms.push({ x: 730, y: 340, width: 70, height: 60 });
    return levelData;
}

let activeLevel = generateLevel(currentLevel);
document.getElementById("levelText").innerText = currentLevel;

function checkCollision(obj1, obj2) {
    return obj1.x < obj2.x + obj2.width && obj1.x + (obj1.w || obj1.width) > obj2.x &&
           obj1.y < obj2.y + obj2.height && obj1.y + (obj1.h || obj1.height) > obj2.y;
}

function update(dtTime) {
    msTimer += dtTime;
    if(msTimer >= 1000) {
        levelTimer--; msTimer = 0;
        document.getElementById("timerText").innerText = levelTimer;
        if(levelTimer <= 0) handleDeath();
    }

    let timeScale = dtTime / 16.666;
    if(timeScale > 3) timeScale = 3; 

    let curChar = characterList[activeCharIndex];
    player.speed = curChar.speed;

    let wasGrounded = player.grounded;
    player.grounded = false;

    if(wasGrounded) {
        coyoteTimer = COYOTE_TIME_MAX;
        player.jumpsMade = 0; 
    } else {
        coyoteTimer -= (dtTime / 1000);
    }
    if(jumpBufferTimer > 0) jumpBufferTimer -= (dtTime / 1000);
    if(player.dashCooldownTimer > 0) player.dashCooldownTimer -= (dtTime / 1000);

    if (keys.dash && player.dashCooldownTimer <= 0) {
        player.dashTimer = 0.15; 
        player.dashCooldownTimer = 1.5; 
        triggerScreenShake(4);
    }

    if (player.dashTimer > 0) {
        player.velX = player.facingDir * 14 * timeScale;
        player.velY = 0; 
        player.dashTimer -= (dtTime / 1000);
        createParticles(player.x + player.w/2, player.y + player.h/2, curChar.color, 2); 
    } else {
        if (keys.left) { player.facingDir = -1; if (player.velX > -player.speed) player.velX -= 0.85 * timeScale; }
        if (keys.right) { player.facingDir = 1; if (player.velX < player.speed) player.velX += 0.85 * timeScale; }
        player.velX *= Math.pow(friction, timeScale); 
        player.velY += gravity * timeScale;
    }

    if (jumpBufferTimer > 0) {
        if (coyoteTimer > 0) {
            player.velY = curChar.jump;
            player.jumpsMade = 1;
            coyoteTimer = 0; jumpBufferTimer = 0;
            createParticles(player.x + player.w/2, player.y + player.h, '#ffffff', 8);
        } else if (player.jumpsMade === 1 && player.dashTimer <= 0) {
            player.velY = curChar.jump * 0.9; 
            player.jumpsMade = 2;
            jumpBufferTimer = 0;
            createParticles(player.x + player.w/2, player.y + player.h, '#38bdf8', 12); 
        }
    }

    activeLevel.platforms.forEach(p => {
        if (player.x + player.w > p.x && player.x < p.x + p.width &&
            player.y + player.h <= p.y + 15 && player.y + player.h + player.velY >= p.y) {
            player.grounded = true; player.velY = 0; player.y = p.y - player.h;
        }
    });

    player.x += player.velX * timeScale;
    player.y += player.velY * timeScale;

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
    if (player.y > canvas.height + 50) handleDeath();

    activeLevel.chocolates.forEach(choc => {
        if (!choc.collected && checkCollision(player, choc)) {
            choc.collected = true;
            totalCoins++; localStorage.setItem("pets_coins", totalCoins);
            document.getElementById("coinText").innerText = totalCoins;
            
            levelTimer += 3; document.getElementById("timerText").innerText = levelTimer;
            let badge = document.getElementById("timeBadge");
            badge.classList.remove("time-bonus"); void badge.offsetWidth; badge.classList.add("time-bonus");
            
            createParticles(choc.x + 8, choc.y + 8, '#f1c40f', 10);
        }
    });

    if (!levelPieceCollected && checkCollision(player, activeLevel.dotPiece)) {
        levelPieceCollected = true;
        document.getElementById("piecesText").innerText = "1/1";
        triggerScreenShake(3);
        createParticles(activeLevel.dotPiece.x + 12, activeLevel.dotPiece.y + 12, '#00ffff', 15);
    }

    if (levelPieceCollected && checkCollision(player, activeLevel.portal)) {
        currentLevel++; localStorage.setItem("pets_level", currentLevel);
        activeLevel = generateLevel(currentLevel); levelPieceCollected = false;
        document.getElementById("levelText").innerText = currentLevel; document.getElementById("piecesText").innerText = "0/1";
        triggerScreenShake(8);
        player.x = 60; player.y = 200; player.velX = 0; player.velY = 0; player.dashCooldownTimer = 0;
        levelTimer = 25; document.getElementById("timerText").innerText = levelTimer;
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx * timeScale; p.y += p.vy * timeScale; p.alpha -= 0.025 * timeScale;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // YENİ GÜNCELLEME: Çizim Katmanları Ayrıldı
    // --- 1. KATMAN: OYUN DÜNYASI (SARSINTIDAN ETKİLENİR) ---
    ctx.save(); 
    
    if (screenShakeFrames > 0) {
        let dx = (Math.random() - 0.5) * screenShakeFrames;
        let dy = (Math.random() - 0.5) * screenShakeFrames;
        ctx.translate(dx, dy); screenShakeFrames--;
    }

    activeLevel.platforms.forEach(p => {
        ctx.fillStyle = "#047857"; ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.fillStyle = "#10b981"; ctx.fillRect(p.x, p.y, p.width, 3);
    });

    activeLevel.chocolates.forEach(choc => {
        if (!choc.collected) {
            ctx.fillStyle = "#f1c40f"; ctx.fillRect(choc.x, choc.y, choc.width, choc.height);
            ctx.fillStyle = "#d35400"; ctx.fillRect(choc.x + 4, choc.y + 4, 8, 8);
        }
    });

    if (!levelPieceCollected) {
        if (images.Dot.complete && images.Dot.naturalWidth !== 0) {
            ctx.drawImage(images.Dot, activeLevel.dotPiece.x, activeLevel.dotPiece.y, activeLevel.dotPiece.width, activeLevel.dotPiece.height);
        } else {
            ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(activeLevel.dotPiece.x + 12, activeLevel.dotPiece.y + 12, 10, 0, Math.PI * 2); ctx.fill();
        }
    }

    ctx.fillStyle = levelPieceCollected ? "#8b5cf6" : "#4b5563";
    ctx.fillRect(activeLevel.portal.x, activeLevel.portal.y, activeLevel.portal.width, activeLevel.portal.height);

    let curChar = characterList[activeCharIndex];
    let stretchY = 1 + (Math.abs(player.velY) * 0.02);
    let stretchX = 1 - (Math.abs(player.velY) * 0.015);
    if(player.dashTimer > 0) { stretchX = 1.3; stretchY = 0.7; } 

    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h); 
    if(player.facingDir === -1) ctx.scale(-1, 1);
    
    if (images[curChar.name] && images[curChar.name].complete && images[curChar.name].naturalWidth !== 0) {
        ctx.drawImage(images[curChar.name], - (player.w * stretchX)/2, - (player.h * stretchY), player.w * stretchX, player.h * stretchY);
    } else {
        ctx.fillStyle = curChar.color;
        ctx.fillRect(- (player.w * stretchX)/2, - (player.h * stretchY), player.w * stretchX, player.h * stretchY);
    }
    ctx.restore();

    particles.forEach(p => {
        ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    ctx.restore(); // OYUN DÜNYASI BİTTİ - KAMERA SIFIRLANDI

    // --- 2. KATMAN: UI VE BUTONLAR (SABİT KALIR, ASLA TİTREMEZ) ---
    
    if (flashRedFrames > 0) {
        ctx.fillStyle = `rgba(220, 38, 38, ${flashRedFrames / 15})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height); flashRedFrames--;
    }

    for (let key in canvasButtons) {
        let btn = canvasButtons[key];
        
        ctx.fillStyle = btn.active ? "#111827" : "#1f2937";
        if(key === 'jump') ctx.fillStyle = btn.active ? "#991b1b" : "#dc2626";
        if(key === 'dash') {
            ctx.fillStyle = btn.active ? "#b45309" : "#f59e0b"; 
            if(player.dashCooldownTimer > 0) ctx.fillStyle = "#4b5563"; 
        }

        ctx.strokeStyle = "#10b981"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

        ctx.fillStyle = "#ffffff";
        ctx.font = `bold ${key === 'jump' ? '32px' : '22px'} Arial`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        
        let labelOffset = key === 'jump' ? -2 : 1;
        
        if(key === 'dash' && player.dashCooldownTimer > 0) {
            ctx.font = "bold 16px Arial";
            ctx.fillText(player.dashCooldownTimer.toFixed(1), btn.x, btn.y + 1);
        } else {
            ctx.fillText(btn.label, btn.x, btn.y + labelOffset);
        }
    }
}

function gameLoop(timestamp) {
    let dt = timestamp - lastTime; lastTime = timestamp;
    update(dt); draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(gameLoop); });
</script>
</body>
</html>
